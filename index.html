<body>

  <!-- HEADER -->
  <header class="topbar">
    <div class="brand">
      <div class="brand__title">The Cruise Companion</div>
      <div class="brand__sub">Offline Web MVP</div>
    </div>

    <div class="trip">
      <label for="tripSelect">Current trip</label>
      <select id="tripSelect"></select>
    </div>
  </header>

<!-- NAVIGATION TABS -->
<nav class="tabs">
  <button class="tab" data-tab="trips">Trips</button>
  <button class="tab" data-tab="matchmaker">Matchmaker</button>
  <button class="tab" data-tab="ports">Ports</button>
  <button class="tab" data-tab="lists">Lists</button>
  <button class="tab" data-tab="tips">Tips</button>
  <button class="tab" data-tab="concierge">Concierge</button>
</nav>

<!-- MAIN CONTENT RENDER TARGET -->
<div id="content"></div>


  <!-- MAIN APP ROOT -->
  <main id="app" class="app"></main>

  <!-- MODAL -->
  <dialog id="modal" class="modal">
    <form method="dialog" class="modal__card">
      <div class="modal__header">
        <h3 id="modalTitle">Modal</h3>
        <button value="cancel" class="icon-btn" aria-label="Close"></button>
      </div>

      <div id="modalBody" class="modal__body"></div>
      <div id="modalFooter" class="modal__footer"></div>
    </form>
  </dialog>

  <script type="module" src="app.js"></script>


</body>
</html>
